<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alchemyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9F1C"/>
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle with glass effect -->
  <circle cx="60" cy="60" r="56" fill="#101010"/>
  <circle cx="60" cy="60" r="56" fill="url(#glassGradient)"/>
  <circle cx="60" cy="60" r="56" stroke="url(#alchemyGradient)" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Alchemy flask/beaker shape -->
  <path d="M45 35 L45 55 L30 85 C28 90 32 95 38 95 L82 95 C88 95 92 90 90 85 L75 55 L75 35"
        fill="none"
        stroke="url(#alchemyGradient)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Flask neck -->
  <path d="M45 35 L45 30 C45 27 48 25 52 25 L68 25 C72 25 75 27 75 30 L75 35"
        fill="none"
        stroke="url(#alchemyGradient)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Liquid inside -->
  <path d="M35 80 Q45 70 55 75 T75 72 L85 85 C87 89 84 93 80 93 L40 93 C36 93 33 89 35 85 Z"
        fill="url(#alchemyGradient)"
        opacity="0.3"/>

  <!-- Bubbles -->
  <circle cx="50" cy="78" r="3" fill="url(#alchemyGradient)" opacity="0.6"/>
  <circle cx="65" cy="82" r="2" fill="url(#alchemyGradient)" opacity="0.5"/>
  <circle cx="55" cy="85" r="2.5" fill="url(#alchemyGradient)" opacity="0.7"/>
  <circle cx="70" cy="75" r="1.5" fill="url(#alchemyGradient)" opacity="0.4"/>

  <!-- Sparkle/magic effect -->
  <circle cx="42" cy="50" r="1.5" fill="#FF6B35"/>
  <circle cx="78" cy="48" r="1" fill="#FF9F1C"/>
  <circle cx="60" cy="42" r="1.2" fill="#FFBC42"/>
</svg>
