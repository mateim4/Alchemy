<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101010"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9F1C"/>
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#FF6B35" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGradient)"/>

  <!-- Decorative glow -->
  <ellipse cx="200" cy="100" rx="200" ry="100" fill="#FF6B35" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="650" cy="350" rx="150" ry="80" fill="#FF9F1C" opacity="0.1" filter="url(#glow)"/>

  <!-- Main Glass Card -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="80" width="340" height="290" rx="16" fill="url(#glassGradient)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- Card Header -->
  <text x="80" y="130" font-family="Poppins, sans-serif" font-size="24" font-weight="600" fill="white">
    <tspan fill="url(#accentGradient)">Alchemy</tspan>
  </text>
  <text x="80" y="155" font-family="Poppins, sans-serif" font-size="14" fill="#8A9199">Design System</text>

  <!-- Button Examples -->
  <rect x="80" y="185" width="120" height="40" rx="8" fill="url(#accentGradient)"/>
  <text x="105" y="211" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="white">Primary</text>

  <rect x="215" y="185" width="120" height="40" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
  <text x="233" y="211" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="#B8BFC5">Secondary</text>

  <!-- Badge Examples -->
  <rect x="80" y="250" width="65" height="24" rx="6" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)"/>
  <circle cx="95" cy="262" r="4" fill="#10b981"/>
  <text x="105" y="267" font-family="Poppins, sans-serif" font-size="11" font-weight="500" fill="#34d399">Active</text>

  <rect x="155" y="250" width="75" height="24" rx="6" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)"/>
  <circle cx="170" cy="262" r="4" fill="#f59e0b"/>
  <text x="180" y="267" font-family="Poppins, sans-serif" font-size="11" font-weight="500" fill="#fbbf24">Pending</text>

  <rect x="240" y="250" width="60" height="24" rx="6" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)"/>
  <circle cx="255" cy="262" r="4" fill="#ef4444"/>
  <text x="265" y="267" font-family="Poppins, sans-serif" font-size="11" font-weight="500" fill="#f87171">Error</text>

  <!-- Input Example -->
  <rect x="80" y="295" width="260" height="44" rx="8" fill="rgba(100,100,100,0.05)" stroke="rgba(255,255,255,0.1)"/>
  <text x="100" y="322" font-family="Poppins, sans-serif" font-size="14" fill="#6B7178">Search components...</text>

  <!-- Right side - Component preview -->
  <g filter="url(#cardShadow)">
    <rect x="420" y="50" width="330" height="180" rx="16" fill="url(#glassGradient)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- Avatar group -->
  <circle cx="460" cy="100" r="20" fill="#FF6B35"/>
  <text x="455" y="106" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="white">JD</text>
  <circle cx="490" cy="100" r="20" fill="#3b82f6" stroke="#101010" stroke-width="2"/>
  <text x="485" y="106" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="white">AK</text>
  <circle cx="520" cy="100" r="20" fill="#10b981" stroke="#101010" stroke-width="2"/>
  <text x="513" y="106" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="white">MR</text>
  <circle cx="550" cy="100" r="20" fill="rgba(255,255,255,0.1)" stroke="#101010" stroke-width="2"/>
  <text x="541" y="106" font-family="Poppins, sans-serif" font-size="12" font-weight="500" fill="#B8BFC5">+5</text>

  <text x="460" y="145" font-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="white">Team Members</text>
  <text x="460" y="168" font-family="Poppins, sans-serif" font-size="13" fill="#8A9199">8 active users collaborating</text>

  <!-- Toggle Switch -->
  <rect x="640" y="85" width="44" height="24" rx="12" fill="url(#accentGradient)"/>
  <circle cx="672" cy="97" r="10" fill="white"/>
  <text x="640" y="130" font-family="Poppins, sans-serif" font-size="12" fill="#8A9199">Dark Mode</text>

  <!-- Toast Example -->
  <g filter="url(#cardShadow)">
    <rect x="420" y="260" width="330" height="80" rx="12" fill="url(#glassGradient)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="420" y="260" width="4" height="80" rx="2" fill="#10b981"/>
  </g>

  <!-- Toast icon -->
  <circle cx="450" cy="300" r="12" fill="rgba(16,185,129,0.2)"/>
  <path d="M445 300 L449 304 L457 296" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <text x="475" y="295" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="white">Changes saved</text>
  <text x="475" y="315" font-family="Poppins, sans-serif" font-size="12" fill="#8A9199">Your settings have been updated.</text>

  <!-- X button -->
  <text x="720" y="290" font-family="Poppins, sans-serif" font-size="16" fill="#6B7178">×</text>

  <!-- Color palette dots -->
  <g transform="translate(420, 370)">
    <circle cx="20" cy="20" r="14" fill="#FF6B35"/>
    <circle cx="55" cy="20" r="14" fill="#FF9F1C"/>
    <circle cx="90" cy="20" r="14" fill="#FFBC42"/>
    <circle cx="125" cy="20" r="14" fill="#10b981"/>
    <circle cx="160" cy="20" r="14" fill="#3b82f6"/>
    <circle cx="195" cy="20" r="14" fill="#8b5cf6"/>
    <circle cx="230" cy="20" r="14" fill="#ec4899"/>
    <circle cx="265" cy="20" r="14" fill="#06b6d4"/>
  </g>

  <text x="420" y="425" font-family="Poppins, sans-serif" font-size="12" fill="#6B7178">Color Palette</text>

  <!-- Bottom tagline -->
  <text x="80" y="420" font-family="Poppins, sans-serif" font-size="12" fill="#6B7178">
    Multi-theme • React • Tailwind • Style Dictionary
  </text>
</svg>
